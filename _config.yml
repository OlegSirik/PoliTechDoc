# ======================================
# Основные настройки сайта
# ======================================

# Название вашего проекта (отображается в шапке и заголовках страниц)
title: "Название вашего проекта"

# Краткое описание (используется для SEO)
description: "Краткое описание вашей документации"

# Базовый URL для GitHub Pages
# Если сайт размещается в репозитории USERNAME.github.io, оставьте пустым
# Если в репозитории с именем проекта, укажите "/название-репозитория"
baseurl: ""

# Основной URL сайта
url: "https://your-username.github.io"

# Адрес репозитория на GitHub (для ссылки "Edit this page")
github_repo: "https://github.com/your-username/your-repo"

# ======================================
# Настройки темы Just the Docs
# ======================================

# Установка темы (для GitHub Pages используйте remote_theme)
remote_theme: just-the-docs/just-the-docs

# Или для локальной установки (раскомментируйте):
# theme: "just-the-docs"

# Версия темы (рекомендуется указывать для стабильности)
# Подробнее: https://github.com/just-the-docs/just-the-docs/releases
# remote_theme: just-the-docs/just-the-docs@v0.10.0

# ======================================
# Визуальное оформление
# ======================================

# Цветовая схема: "light" (светлая, по умолчанию) или "dark" (тёмная)
color_scheme: light

# Путь к логотипу (отображается вместо текстового заголовка)
# Поместите файл логотипа в папку assets/images/
# logo: "/assets/images/logo.png"

# Путь к иконке сайта (favicon)
# favicon_ico: "/assets/images/favicon.ico"

# ======================================
# Навигация
# ======================================

# Включение бокового меню (по умолчанию true)
nav_enabled: true

# Сортировка пунктов навигации:
# - "case_insensitive" — без учёта регистра
# - "case_sensitive" — с учётом регистра
nav_sort: case_insensitive

# ======================================
# Поиск
# ======================================

# Включение поиска
search_enabled: true

# Настройки поиска
search:
  # Уровень заголовков для разбивки на секции (1-6, по умолчанию 2)
  heading_level: 2
  # Максимальное количество предпросмотров в результатах поиска
  previews: 3
  # Количество слов до найденного слова в предпросмотре
  preview_words_before: 5
  # Количество слов после найденного слова в предпросмотре
  preview_words_after: 10
  # Разделитель токенов поиска
  tokenizer_separator: /[\s/]+/
  # Показывать относительный URL в результатах
  rel_url: true
  # Плавающая кнопка поиска (true/false, по умолчанию false)
  button: false
  # Клавиша для фокуса на поиске (Ctrl/Cmd + K)
  focus_shortcut_key: 'k'

# ======================================
# Ссылки в правом верхнем углу
# ======================================

# Дополнительные ссылки в шапке сайта
aux_links:
  "Документация на GitHub":
    - "https://github.com/your-username/your-repo"

# Открывать дополнительные ссылки в новой вкладке
aux_links_new_tab: true

# ======================================
# Якоря для заголовков
# ======================================

# Показывать якоря для ссылок на заголовки при наведении
heading_anchors: true

# ======================================
# Нижний колонтитул (footer)
# ======================================

# Текст в нижнем колонтитуле
footer_content: "Copyright &copy; 2024. Распространяется под лицензией MIT."

# Показывать время последнего редактирования страницы
# (нужно добавить поле last_modified_date в frontmatter страницы)
last_edit_timestamp: true
# Формат отображения даты
last_edit_time_format: "%d.%m.%Y"

# Ссылка "Редактировать эту страницу на GitHub"
gh_edit_link: true
gh_edit_link_text: "Редактировать эту страницу на GitHub"
gh_edit_repository: "https://github.com/your-username/your-repo"
gh_edit_branch: "main"  # или "master"
# Папка с исходными файлами документации
gh_edit_source: docs
gh_edit_view_mode: "tree"  # или "edit"

# Кнопка "Наверх"
back_to_top: true
back_to_top_text: "Наверх"

# ======================================
# Callouts (информационные блоки)
# ======================================

# Настройка пользовательских callout-блоков
# Подробнее: https://just-the-docs.com/docs/ui-components/callouts/
callouts:
  warning:
    title: "Внимание"
    color: red
  note:
    title: "Примечание"
    color: blue
  tip:
    title: "Совет"
    color: green

# ======================================
# Google Analytics (опционально)
# ======================================

# ID для Google Analytics (GA4 или Universal)
# ga_tracking: "G-XXXXXXXXXX"
# ga_tracking_anonymize_ip: true

# ======================================
# Mermaid-диаграммы (опционально)
# ======================================

# Поддержка Mermaid-диаграмм в кодовых блоках
# mermaid:
#   version: "9.1.3"

# ======================================
# Коллекции документов (опционально)
# ======================================

# Настройка коллекций для группировки документации
# Подробнее: https://just-the-docs.com/docs/navigation/collections/
# collections:
#   guides:
#     permalink: "/:collection/:path/"
#     output: true
#   reference:
#     permalink: "/:collection/:path/"
#     output: true

# just_the_docs:
#   collections:
#     guides:
#       name: "Руководства"
#       nav_fold: true  # сворачиваемая секция
#     reference:
#       name: "Справочник"

# ======================================
# Исключения при сборке
# ======================================

# Файлы и папки, которые не нужно копировать в итоговый сайт
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - README.md

# ======================================
# Плагины Jekyll
# ======================================

plugins:
  - jekyll-seo-tag
